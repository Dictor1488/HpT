name: Build Watch-Structure Gameface HPBar

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build wotmod
        shell: pwsh
        run: ./tools/build_wotmod.ps1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-hpbar-gameface-watch-structure
          path: build/*.wotmod
