name: Build me.inq.custom_hpbar.wotmod

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version"
        required: false
        default: "1"
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3 for builder
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build me.inq.custom_hpbar.wotmod
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="1"; fi
          python build.py --version "$VERSION"
          test -f build/me.inq.custom_hpbar.wotmod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: me.inq.custom_hpbar.wotmod
