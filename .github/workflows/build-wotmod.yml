name: Build Custom HPBar Gameface wotmod

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version"
        required: false
        default: "0.0.46"
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3 for builder
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wotmod
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="0.0.46"; fi
          python build.py --version "$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-hpbar-gameface-wotmod
          path: build/*.wotmod
