name: Build me.inq.custom_hpbar.wotmod

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version"
        required: false
        default: "1"
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3 for builder
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build me.inq.custom_hpbar.wotmod
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then VERSION="1"; fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"
          python build.py --version "$VERSION"
          echo "Built files:"
          ls -la build
          BUILT_FILE="$(find build -maxdepth 1 -type f -name '*.wotmod' | head -n 1)"
          if [ -z "$BUILT_FILE" ]; then
            echo "No .wotmod file was created"
            exit 1
          fi
          if [ "$BUILT_FILE" != "build/me.inq.custom_hpbar.wotmod" ]; then
            mv "$BUILT_FILE" build/me.inq.custom_hpbar.wotmod
          fi
          test -f build/me.inq.custom_hpbar.wotmod

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: me.inq.custom_hpbar.wotmod
          path: build/me.inq.custom_hpbar.wotmod

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: INQ Custom HPBar ${{ env.TAG }}
          body_path: docs/RELEASE_1.md
          files: build/me.inq.custom_hpbar.wotmod
          fail_on_unmatched_files: true
