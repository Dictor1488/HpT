<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="CustomHPBar.css">
</head>
<body>
  <div id="hpbar-root" class="hidden">
    <div id="hpbar-holder">
      <div id="allyLayer" class="team-layer ally-layer"></div>
      <div id="enemyLayer" class="team-layer enemy-layer"></div>

      <div id="allyMarkers" class="marker-row ally-markers"></div>
      <div id="enemyMarkers" class="marker-row enemy-markers"></div>

      <div id="allyHp" class="hp-value ally-hp">0</div>
      <div id="enemyHp" class="hp-value enemy-hp">0</div>
      <div id="allyCaption" class="hp-caption">ХП</div>
      <div id="enemyCaption" class="hp-caption">ХП</div>
      <div id="allyPct" class="pct">100%</div>
      <div id="enemyPct" class="pct">100%</div>

      <div id="score" class="score">0 : 0</div>
      <div class="diff-connector"></div>
      <div id="diffBox" class="diff-box positive"><span id="diff">+ 0</span></div>
    </div>
  </div>
  <script defer src="CustomHPBar.js"></script>
</body>
</html>
